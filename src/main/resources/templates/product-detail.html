<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${product.name} + ' — Bakers.in'">Product — Bakers.in</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700&display=swap"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main>
    <section class="section" th:style="'--accent:' + ${product.category.accentColor}">
        <div class="breadcrumb">
            <a href="/products">Menu</a> /
            <a th:href="@{/products(category=${product.category.slug})}" th:text="${product.category.name}">Category</a> /
            <span th:text="${product.name}">Product</span>
        </div>

        <div class="product-detail">
            <div class="product-detail-image">
                <img th:src="${product.imageUrl}" th:alt="${product.name}"/>
                <span class="sale-badge" th:if="${product.onSale}" th:text="${product.discountPercent} + '% OFF'">10% OFF</span>
            </div>

            <div class="product-detail-info">
                <h1 th:text="${product.name}">Product Name</h1>
                <div class="product-rating" th:if="${product.rating != null}">⭐ <span th:text="${product.rating}">4.5</span> rating</div>
                <p class="product-description" th:text="${product.description}">Description</p>

                <div class="product-price product-price-lg">
                    <span class="price-current" th:text="'₹' + ${product.effectivePrice}">₹499</span>
                    <span class="price-original" th:if="${product.onSale}" th:text="'₹' + ${product.price}">₹599</span>
                    <span class="price-unit" th:text="${product.unit.label}">per kg</span>
                </div>

                <p class="stock-note" th:text="${product.inStock} ? 'In stock' : 'Currently out of stock'">In stock</p>

                <form th:action="@{/cart/add}" method="post" class="add-to-cart-form-lg" th:if="${product.inStock}">
                    <input type="hidden" name="productId" th:value="${product.id}"/>
                    <label for="quantity">Quantity</label>
                    <input type="number" id="quantity" name="quantity" value="1" min="1" max="20"/>
                    <button type="submit" class="btn btn-primary">Add to Cart</button>
                </form>
            </div>
        </div>

        <div class="related-products" th:if="${relatedProducts != null and !relatedProducts.isEmpty()}">
            <h2 class="section-title">You might also like</h2>
            <div class="product-grid">
                <div th:each="p : ${relatedProducts}"
                     th:style="'--accent:' + ${p.category.accentColor}"
                     class="product-card">
                    <a th:href="@{/products/{slug}(slug=${p.slug})}" class="product-image-link">
                        <img th:src="${p.imageUrl}" th:alt="${p.name}" class="product-image"/>
                        <span class="sale-badge" th:if="${p.onSale}" th:text="${p.discountPercent} + '% OFF'">10% OFF</span>
                    </a>
                    <div class="product-info">
                        <a th:href="@{/products/{slug}(slug=${p.slug})}" class="product-name" th:text="${p.name}">Product</a>
                        <div class="product-price">
                            <span class="price-current" th:text="'₹' + ${p.effectivePrice}">₹499</span>
                            <span class="price-unit" th:text="${p.unit.label}">per kg</span>
                        </div>
                        <form th:action="@{/cart/add}" method="post" class="add-to-cart-form">
                            <input type="hidden" name="productId" th:value="${p.id}"/>
                            <input type="hidden" name="quantity" value="1"/>
                            <button type="submit" class="btn btn-add">Add to Cart</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
