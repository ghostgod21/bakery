<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Checkout — Bakers.in</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700&display=swap"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main>
    <section class="section">
        <h1 class="page-title">Checkout</h1>

        <div class="checkout-layout">
            <form th:action="@{/checkout}" th:object="${checkoutForm}" method="post" class="checkout-form">
                <h2>Delivery Details</h2>

                <label for="name">Full Name</label>
                <input type="text" id="name" th:field="*{name}"/>
                <span class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Name error</span>

                <label for="email">Email</label>
                <input type="email" id="email" th:field="*{email}"/>
                <span class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Email error</span>

                <label for="phone">Phone Number</label>
                <input type="text" id="phone" th:field="*{phone}"/>
                <span class="field-error" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}">Phone error</span>

                <label for="address">Address</label>
                <textarea id="address" th:field="*{address}" rows="3"></textarea>
                <span class="field-error" th:if="${#fields.hasErrors('address')}" th:errors="*{address}">Address error</span>

                <div class="form-row">
                    <div>
                        <label for="city">City</label>
                        <input type="text" id="city" th:field="*{city}"/>
                        <span class="field-error" th:if="${#fields.hasErrors('city')}" th:errors="*{city}">City error</span>
                    </div>
                    <div>
                        <label for="pin">PIN Code</label>
                        <input type="text" id="pin" th:field="*{pin}"/>
                        <span class="field-error" th:if="${#fields.hasErrors('pin')}" th:errors="*{pin}">PIN error</span>
                    </div>
                </div>

                <h2>Payment Method</h2>
                <p class="payment-note">This is a demo storefront — no payment is actually processed.</p>
                <div class="payment-options">
                    <label class="payment-option">
                        <input type="radio" th:field="*{paymentMethod}" value="Cash on Delivery"/> Cash on Delivery
                    </label>
                    <label class="payment-option">
                        <input type="radio" th:field="*{paymentMethod}" value="UPI"/> UPI
                    </label>
                    <label class="payment-option">
                        <input type="radio" th:field="*{paymentMethod}" value="Card"/> Card
                    </label>
                </div>
                <span class="field-error" th:if="${#fields.hasErrors('paymentMethod')}" th:errors="*{paymentMethod}">Payment error</span>

                <button type="submit" class="btn btn-primary btn-block">Place Order</button>
            </form>

            <aside class="cart-summary" th:if="${cart != null}">
                <h2>Order Summary</h2>
                <div class="summary-row" th:each="entry : ${cart.items}">
                    <span th:text="${entry.value.productName} + ' x' + ${entry.value.quantity}">Item x1</span>
                    <span th:text="'₹' + ${entry.value.subtotal}">₹499</span>
                </div>
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span th:text="'₹' + ${cart.subtotal}">₹998</span>
                </div>
                <div class="summary-row">
                    <span>Delivery</span>
                    <span th:text="${cart.deliveryFeeCharged} ? '₹' + ${cart.deliveryFee} : 'FREE'">FREE</span>
                </div>
                <div class="summary-row summary-total">
                    <span>Total</span>
                    <span th:text="'₹' + ${cart.total}">₹998</span>
                </div>
            </aside>
        </div>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
