<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<header th:fragment="header" class="site-header">
    <div class="header-inner">
        <a href="/" class="brand">🧁 <span>Bakers<span class="brand-dot">.in</span></span></a>

        <form action="/products" method="get" class="search-form">
            <input type="text" name="q" placeholder="Search cakes, pizza, mocktails..." aria-label="Search products"/>
            <button type="submit" aria-label="Search">🔍</button>
        </form>

        <nav class="main-nav">
            <a href="/products">Menu</a>
            <a href="/about">About</a>
            <a href="/cart" class="cart-link">
                🛒 Cart
                <span class="cart-badge" th:if="${cartItemCount != null and cartItemCount > 0}" th:text="${cartItemCount}">0</span>
            </a>
        </nav>
    </div>

    <div class="category-strip" th:if="${navCategories != null}">
        <a th:each="cat : ${navCategories}"
           th:href="@{/products(category=${cat.slug})}"
           th:style="'--accent:' + ${cat.accentColor}"
           class="category-chip">
            <span th:text="${cat.icon}">🎂</span>
            <span th:text="${cat.name}">Category</span>
        </a>
    </div>
</header>
</body>
</html>
