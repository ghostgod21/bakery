<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${activeCategory != null} ? ${activeCategory.name} + ' — Bakers.in' : 'Menu — Bakers.in'">Menu — Bakers.in</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700&display=swap"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main>
    <section class="section">
        <h1 class="page-title" th:if="${searchTerm != null}" th:text="'Results for &quot;' + ${searchTerm} + '&quot;'">Search results</h1>
        <h1 class="page-title" th:if="${searchTerm == null and activeCategory != null}" th:text="${activeCategory.icon} + ' ' + ${activeCategory.name}">Category</h1>
        <h1 class="page-title" th:if="${searchTerm == null and activeCategory == null}">Our Full Menu</h1>

        <div class="filter-chips">
            <a href="/products" th:classappend="${activeCategory == null and searchTerm == null} ? 'chip-active'" class="chip">All</a>
            <a th:each="cat : ${categories}"
               th:href="@{/products(category=${cat.slug})}"
               th:classappend="${activeCategory != null and activeCategory.slug == cat.slug} ? 'chip-active'"
               th:style="'--accent:' + ${cat.accentColor}"
               class="chip" th:text="${cat.icon} + ' ' + ${cat.name}">Category</a>
        </div>

        <div class="product-grid" th:if="${products != null and !products.isEmpty()}">
            <div th:each="product : ${products}"
                 th:style="'--accent:' + ${product.category.accentColor}"
                 class="product-card">
                <a th:href="@{/products/{slug}(slug=${product.slug})}" class="product-image-link">
                    <img th:src="${product.imageUrl}" th:alt="${product.name}" class="product-image"/>
                    <span class="sale-badge" th:if="${product.onSale}" th:text="${product.discountPercent} + '% OFF'">10% OFF</span>
                    <span class="veg-dot" th:classappend="${product.veg} ? 'veg' : 'nonveg'" th:title="${product.veg} ? 'Veg' : 'Non-veg'"></span>
                </a>
                <div class="product-info">
                    <a th:href="@{/products/{slug}(slug=${product.slug})}" class="product-name" th:text="${product.name}">Product</a>
                    <div class="product-rating" th:if="${product.rating != null}">⭐ <span th:text="${product.rating}">4.5</span></div>
                    <div class="product-price">
                        <span class="price-current" th:text="'₹' + ${product.effectivePrice}">₹499</span>
                        <span class="price-original" th:if="${product.onSale}" th:text="'₹' + ${product.price}">₹599</span>
                        <span class="price-unit" th:text="${product.unit.label}">per kg</span>
                    </div>
                    <form th:action="@{/cart/add}" method="post" class="add-to-cart-form">
                        <input type="hidden" name="productId" th:value="${product.id}"/>
                        <input type="hidden" name="quantity" value="1"/>
                        <button type="submit" class="btn btn-add" th:disabled="${!product.inStock}"
                                th:text="${product.inStock} ? 'Add to Cart' : 'Out of Stock'">Add to Cart</button>
                    </form>
                </div>
            </div>
        </div>

        <p class="empty-state" th:if="${products == null or products.isEmpty()}">
            No products found. Try a different search or browse another category.
        </p>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
